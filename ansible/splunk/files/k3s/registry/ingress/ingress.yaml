---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: splunk
  namespace: splunk
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/`)
      services:
        - kind: Service
          name: splunk
          port: 8000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: splunk-hec
  namespace: splunk
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/`)
      services:
        - kind: Service
          name: splunk-hec
          port: 8080