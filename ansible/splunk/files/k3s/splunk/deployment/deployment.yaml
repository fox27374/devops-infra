apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk
  namespace: splunk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splunk
  template:
    metadata:
      labels:
        app: splunk
    spec:
      enableServiceLinks: false
      containers:
      - name: splunk
        image: docker.io/splunk/splunk:10.2
        envFrom:
        - secretRef:
            name: splunk
        volumeMounts:
        - name: splunk-cm
          mountPath: "/tmp/defaults"
          readOnly: true
      volumes:
      - name: splunk-cm
        configMap:
          name: splunk


