---
- name: Update/Upgrade apt archives
  ansible.builtin.apt:
    update_cache: yes
    upgrade: "yes"
    cache_valid_time: 86400
  become: true

- name: Install podman
  ansible.builtin.apt:
    name: "podman"
    state: present
  become: true

- name: Install podman-compose
  ansible.builtin.apt:
    name: "podman-compose"
    state: present
  become: true